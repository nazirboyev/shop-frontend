<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>

<link rel="stylesheet" href="main.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* AUTH PAGE */
.auth{
width:80%;
margin:80px auto;
}

.auth h1{
text-align:center;
margin-bottom:60px;
font-size:32px;
}

.auth-container{
display:grid;
grid-template-columns:1fr 1fr;
gap:80px;
}

.auth-box h2{
font-size:22px;
margin-bottom:10px;
}

.auth-box p{
margin-bottom:25px;
color:#666;
}

.auth-box form{
display:flex;
flex-direction:column;
gap:20px;
}

.auth-box input{
border:none;
border-bottom:1px solid #ccc;
padding:10px 5px;
font-size:16px;
outline:none;
}

.auth-buttons{
display:flex;
gap:20px;
margin-top:20px;
}

.btn-black{
background:black;
color:white;
border:none;
padding:12px 25px;
cursor:pointer;
}

.btn-google{
background:#4285F4;
color:white;
border:none;
padding:12px 25px;
cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:900px){
.auth-container{
grid-template-columns:1fr;
gap:50px;
}
}

</style>

</head>
<body>

<header class="navbar">
  <div class="logo">
    <i class="fa-solid fa-crown"></i>
  </div>

  <nav class="nav-links">
    <a href="index.html">Shop</a>
    <a href="signin.html">Sign In</a>

    <div class="cart">
      <input type="checkbox" id="cart-toggle">
      <label for="cart-toggle"><i class="fa-solid fa-bag-shopping"></i></label>

      <div class="cart-dropdown">
        <p>Your cart is empty</p>
        <button onclick="goCheckout()">GO TO CHECKOUT</button>
      </div>
    </div>

  </nav>
</header>


<section class="auth">

<h1>Authentication</h1>

<div class="auth-container">

<!-- SIGN IN -->
<div class="auth-box">

<h2>I already have an account.</h2>
<p>Sign in with your email and password</p>

<form>

<input type="email" placeholder="Email" required>

<input type="password" placeholder="Password" required>

<div class="auth-buttons">

<button class="btn-black">SIGN IN</button>

<button type="button" class="btn-google">
<i class="fa-brands fa-google"></i> SIGN IN WITH GOOGLE
</button>

</div>

</form>

</div>


<!-- SIGN UP -->
<div class="auth-box">

<h2>Don't have an Account?</h2>
<p>Sign up with email and password</p>

<form>

<input type="text" placeholder="Display Name" required>

<input type="email" placeholder="Email" required>

<input type="password" placeholder="Password" required>

<input type="password" placeholder="Confirm Password" required>

<button class="btn-black">SIGN UP</button>

</form>

</div>

</div>

</section>
<script src="script.js"></script>
</body>
</html>
